<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Business HQ</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; padding: 40px; }
        .hero { margin-top: 50px; }
        h1 { font-size: 2.5em; color: #ffc439; }
        p { font-size: 1.2em; color: #ddd; }
        /* Der "echte" Button */
        .paypal-btn {
            display: inline-block;
            background: #ffc439;
            color: #000;
            padding: 20px 50px;
            font-size: 22px;
            font-weight: 800;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 40px;
            transition: transform 0.2s;
            border: 2px solid #fff;
        }
        .paypal-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Premium Business HQ</h1>
        <p>Exklusive Assets für deinen Erfolg.</p>
        <a href="https://paypal.me/Novalyn2000" class="paypal-btn">Jetzt kaufen via PayPal</a>
    </div>
</body>
</html>
